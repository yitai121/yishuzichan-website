<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="referrer" content="strict-origin-when-cross-origin">
<meta http-equiv="X-Content-Type-Options" content="nosniff">
<meta name="format-detection" content="telephone=no">
<title>会议进行中 — 亿数视频会议室</title>
<meta name="description" content="亿数视频会议房间——无会员、无广告、无关停，端到端加密。">
<meta name="robots" content="noindex, nofollow">
<link rel="icon" type="image/x-icon" href="./images/favicon.ico">
<link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
<link rel="apple-touch-icon" sizes="180x180" href="./images/apple-touch-icon.png">
<meta name="theme-color" content="#f7f9fc">
<style>
:root {
  --brand: #5B5FC7;
  --brand-dark: #4A4EA8;
  --surface-0: #FFFFFF;
  --surface-1: #F7F9FC;
  --text-primary: #1A1A2E;
  --text-secondary: #6B7280;
  --border-subtle: #E5E7EB;
  --danger: #EF4444;
  --danger-dark: #DC2626;
  --font: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'SF Pro Text', 'Helvetica Neue', 'PingFang SC', 'Microsoft YaHei', sans-serif;
  --nav-height: 56px;
  --footer-height: 40px;
  --duration-fast: 0.15s;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; }
body {
  font-family: var(--font);
  background: var(--surface-1);
  color: var(--text-primary);
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  display: flex;
  flex-direction: column;
}
a { color: inherit; text-decoration: none; }
button { font-family: inherit; cursor: pointer; border: none; background: none; }

/* ========== MINI NAV ========== */
.mini-nav {
  height: var(--nav-height);
  background: rgba(255,255,255,0.95);
  backdrop-filter: saturate(180%) blur(20px);
  -webkit-backdrop-filter: saturate(180%) blur(20px);
  border-bottom: 1px solid var(--border-subtle);
  flex-shrink: 0;
  z-index: 20;
}
.mini-nav-inner {
  height: 100%;
  padding: 0 var(--nav-height) 0 var(--nav-height);
  padding-left: 20px; padding-right: 20px;
  display: flex; align-items: center; justify-content: space-between;
  gap: 12px;
}
.mini-nav-logo {
  display: flex; align-items: center; gap: 10px;
  font-weight: 700; font-size: 17px; color: var(--text-primary);
}
.mini-nav-logo img { height: 28px; width: auto; }
.mini-room-badge {
  display: none;
  align-items: center; gap: 6px;
  padding: 4px 10px;
  background: rgba(91,95,199,0.10);
  border-radius: 999px;
  font-size: 12px; font-weight: 500;
  color: var(--brand);
  font-family: 'SF Mono', 'Menlo', 'Monaco', monospace;
}
@media (min-width: 640px) { .mini-room-badge { display: inline-flex; } }
.mini-room-dot { width: 6px; height: 6px; border-radius: 50%; background: #10B981; animation: pulse 2s ease-in-out infinite; }
@keyframes pulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.5; transform: scale(0.85); }
}
.mini-nav-actions { display: flex; align-items: center; gap: 8px; }
.mini-btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 7px 14px;
  font-size: 13px; font-weight: 600;
  border-radius: 8px;
  transition: background var(--duration-fast), transform var(--duration-fast);
}
.mini-btn svg { width: 14px; height: 14px; }
.mini-btn.ghost {
  color: var(--text-secondary);
  background: transparent;
  border: 1px solid var(--border-subtle);
}
.mini-btn.ghost:hover { background: #F3F4F6; color: var(--text-primary); }
.mini-btn.danger {
  color: white;
  background: var(--danger);
}
.mini-btn.danger:hover { background: var(--danger-dark); transform: translateY(-1px); }
@media (max-width: 480px) {
  .mini-btn { padding: 6px 10px; font-size: 12px; }
  .mini-btn .label-full { display: none; }
}

/* ========== MAIN AREA ========== */
.main {
  flex: 1;
  position: relative;
  background: var(--surface-1);
  overflow: hidden;
}
#jitsi-container {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  background: var(--surface-1);
}
#jitsi-container iframe { border: 0 !important; width: 100% !important; height: 100% !important; }

/* Loading state */
.loading-overlay {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  background: var(--surface-1);
  z-index: 5;
  transition: opacity 0.4s ease, visibility 0.4s ease;
}
.loading-overlay.hide {
  opacity: 0;
  visibility: hidden;
  pointer-events: none;
}
.loading-logo {
  width: 68px; height: 68px;
  border-radius: 16px;
  background: linear-gradient(135deg, var(--brand), #7B7FD9);
  display: flex; align-items: center; justify-content: center;
  margin-bottom: 20px;
  box-shadow: 0 8px 24px rgba(91,95,199,0.28);
}
.loading-logo svg { width: 32px; height: 32px; color: white; }
.loading-title { font-size: 20px; font-weight: 700; color: var(--text-primary); margin-bottom: 8px; letter-spacing: -0.01em; }
.loading-subtitle { font-size: 14px; color: var(--text-secondary); margin-bottom: 20px; }
.loading-spinner {
  width: 32px; height: 32px;
  border: 3px solid rgba(91,95,199,0.15);
  border-top-color: var(--brand);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading-tip {
  margin-top: 20px;
  font-size: 12px; color: var(--text-secondary);
  max-width: 460px; text-align: center;
  line-height: 1.6;
  padding: 0 20px;
}

/* Error state */
.error-overlay {
  position: absolute; inset: 0;
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  background: var(--surface-1);
  z-index: 6;
  padding: 24px;
  text-align: center;
}
.error-overlay.show { display: flex; }
.error-icon {
  width: 56px; height: 56px;
  border-radius: 50%;
  background: rgba(239,68,68,0.12);
  color: var(--danger);
  display: inline-flex; align-items: center; justify-content: center;
  margin-bottom: 16px;
}
.error-icon svg { width: 28px; height: 28px; }
.error-title { font-size: 20px; font-weight: 700; margin-bottom: 8px; }
.error-desc { font-size: 14px; color: var(--text-secondary); max-width: 500px; margin-bottom: 24px; line-height: 1.6; }
.error-actions { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; }
.error-btn-primary { padding: 10px 20px; background: var(--brand); color: white; border-radius: 8px; font-size: 14px; font-weight: 600; }
.error-btn-primary:hover { background: var(--brand-dark); }
.error-btn-ghost { padding: 10px 20px; border: 1px solid var(--border-subtle); border-radius: 8px; font-size: 14px; font-weight: 600; color: var(--text-primary); background: white; }
.error-btn-ghost:hover { background: #F3F4F6; }

/* ========== MINI FOOTER ========== */
.mini-footer {
  height: var(--footer-height);
  background: white;
  border-top: 1px solid var(--border-subtle);
  padding: 0 20px;
  display: flex; align-items: center; justify-content: space-between;
  gap: 12px;
  font-size: 12px;
  color: var(--text-secondary);
  flex-shrink: 0;
}
.mini-footer .copyright { flex-shrink: 0; }
.mini-footer .compliance-mini {
  display: flex; align-items: center; gap: 6px;
  color: #B8860B;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.mini-footer .compliance-mini svg { width: 14px; height: 14px; flex-shrink: 0; }
@media (max-width: 640px) {
  .mini-footer { padding: 0 12px; font-size: 11px; }
  .mini-footer .compliance-mini span { display: none; }
}

/* ========== 移动端横屏提示 ========== */
.orientation-tip {
  display: none;
  position: fixed;
  bottom: calc(var(--footer-height) + 12px);
  left: 50%;
  transform: translateX(-50%);
  z-index: 30;
  padding: 8px 14px;
  background: rgba(26,26,46,0.92);
  color: white;
  border-radius: 999px;
  font-size: 12px;
  box-shadow: 0 6px 20px rgba(0,0,0,0.25);
  animation: fadeInUp 0.4s ease-out;
}
.orientation-tip svg { width: 12px; height: 12px; display: inline-block; vertical-align: middle; margin-right: 6px; }
@keyframes fadeInUp {
  from { opacity: 0; transform: translate(-50%, 12px); }
  to { opacity: 1; transform: translate(-50%, 0); }
}
@media (max-width: 640px) and (orientation: portrait) {
  .orientation-tip.enabled { display: inline-flex; align-items: center; }
}
</style>
</head>
<body>

<!-- ========== MINI NAV ========== -->
<header class="mini-nav" role="banner">
  <div class="mini-nav-inner">
    <a href="index.html" class="mini-nav-logo" aria-label="亿数首页">
      <img src="./images/yishu-logo-nav.png" alt="亿数Logo" decoding="async">
      <span>亿数会议</span>
    </a>
    <div class="mini-room-badge" id="roomBadge" aria-label="当前房间">
      <span class="mini-room-dot" aria-hidden="true"></span>
      <span id="roomLabel">加载中…</span>
    </div>
    <div class="mini-nav-actions">
      <a href="index.html" class="mini-btn ghost" aria-label="返回亿数首页">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path></svg>
        <span class="label-full">返回首页</span>

        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
        <span class="label-full">退出会议</span>
      </button>
    </div>
  </div>
</header>

<!-- ========== MAIN AREA (Jitsi container) ========== -->
<main class="main" role="main">
  <div id="jitsi-container" aria-label="视频会议画面"></div>

  <!-- Loading state -->
  <div class="loading-overlay" id="loadingOverlay">
    <div class="loading-logo" aria-hidden="true">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 7l-7 5 7 5V7z"></path><rect x="1" y="5" width="15" height="14" rx="2" ry="2"></rect></svg>
    </div>

      首次进入需要授权摄像头和麦克风权限。为获得最佳体验，请使用 Chrome / Edge / Safari 最新版浏览器。
    </div>
  </div>

  <!-- Error state -->
  <div class="error-overlay" id="errorOverlay" role="alert">
    <div class="error-icon" aria-hidden="true">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"></path><line x1="12" y1="9" x2="12" y2="13"></line><line x1="12" y1="17" x2="12.01" y2="17"></line></svg>
    </div>

      亿数会议服务器尚未部署完成，或您的网络无法访问会议服务。请稍后再试，或返回会议入口页。
    </div>
    <div class="error-actions">
      <button class="error-btn-primary" onclick="location.reload()" type="button">重新加载</button>
      <a href="meeting.html" class="error-btn-ghost">返回会议入口</a>

  <!-- 移动端横屏提示 -->
  <div class="orientation-tip" id="orientationTip" role="status">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11a2 2 0 012 2v6"></path><path d="M19 15l3 3-3 3"></path><path d="M14 18h8"></path></svg>
    <span>横屏体验更佳</span>
  </div>
</main>

<!-- ========== MINI FOOTER ========== -->
<footer class="mini-footer" role="contentinfo">
  <span class="copyright">© 2026 亿数 · 视频会议</span>
  <span class="compliance-mini">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"></path><line x1="12" y1="9" x2="12" y2="13"></line><line x1="12" y1="17" x2="12.01" y2="17"></line></svg>

</body>
