    }
  }
  return { name: '平台动态', cls: 'blue' };
}

// 判断是否需要风险提示（数字藏品类）
function needRiskNotice(post) {
  var text = ((post.title || '') + ' ' + (post.content || '')).toLowerCase();
  var keywords = ['数字资产', '数字藏品', '合成', '寄售', '开放交易', '限价', '瓦当', '数藏', '文创'];
  for (var i = 0; i < keywords.length; i++) {
    if (text.indexOf(keywords[i]) !== -1) return true;
  }
  return false;
}

// 格式化时间戳
function formatDate(ts) {
  if (!ts) return '--';
  var d = new Date(Number(ts));
  var pad = function(n) { return n < 10 ? '0' + n : n; };
  return d.getFullYear() + '-' + pad(d.getMonth() + 1) + '-' + pad(d.getDate());
}

// 渲染内容
function renderPost(post) {
  document.getElementById('stateLoading').style.display = 'none';
  document.getElementById('stateContent').style.display = 'block';

  // 标题
  var title = post.title || '公告详情';
  document.title = title + ' — 亿数';
  document.getElementById('postTitle').textContent = title;
  document.getElementById('crumbTitle').textContent = title;

  // 更新 meta description
  var desc = (post.content || '').replace(/[#*!\[\]\(\)`_>-]/g, '').replace(/\s+/g, ' ').trim().slice(0, 120);
  var metaDesc = document.querySelector('meta[name="description"]');
  if (metaDesc && desc) metaDesc.setAttribute('content', desc);

  // 分类标签
  var tag = classifyPost(post);
  var tagEl = document.getElementById('postTag');
  tagEl.textContent = tag.name;
  tagEl.className = 'article-tag ' + tag.cls;

  // 日期与阅读量
  document.getElementById('postDate').textContent = formatDate(post.publishAt);
  var viewCount = post.viewCount || 0;
  document.getElementById('postViews').textContent = viewCount > 0 ? ('阅读 ' + viewCount) : '';

  // Markdown 渲染
  marked.setOptions({
    breaks: true,
    gfm: true,
  });
  var html = marked.parse(post.content || '_（暂无内容）_');
  var contentEl = document.getElementById('postContent');
  contentEl.innerHTML = html;

  // 给所有图片加 no-referrer + lazy 加载 + 错误处理
  var imgs = contentEl.querySelectorAll('img');
  imgs.forEach(function(img) {
    img.setAttribute('referrerpolicy', 'no-referrer');
    img.setAttribute('loading', 'lazy');
    img.addEventListener('error', function() {
      this.style.display = 'none';
    });
  });

  // 外部链接自动 target="_blank"
  var links = contentEl.querySelectorAll('a');
  links.forEach(function(a) {
    var href = a.getAttribute('href') || '';
    if (href.startsWith('http')) {
      a.setAttribute('target', '_blank');
      a.setAttribute('rel', 'noopener noreferrer');
    }
  });

  // 风险提示按需显示
  if (!needRiskNotice(post)) {
    document.getElementById('riskNotice').style.display = 'none';
  }

  // ===== 动态注入 SEO 元数据 & JSON-LD（兜底，实际爬虫应走 /posts/{id}.html 静态页） =====
  try {
    var staticUrl = 'https://yishuzichan.cc/posts/' + post.id + '.html';
    // 更新 canonical 指向静态页
    var canon = document.querySelector('link[rel="canonical"]');
    if (canon) canon.setAttribute('href', staticUrl);

    // 抓封面图
    var coverMatch = /!\[[^\]]*\]\(([^)\s]+)\)/.exec(post.content || '');
    var cover = coverMatch ? coverMatch[1].replace(/^http:\/\/eopcos\.yishuzichan\.cn/, 'https://eopcos.yishuzichan.cn') : 'https://yishuzichan.cc/images/es-logo.png';

    // OG / Twitter Card
    function upsertMeta(prop, name, content) {
      var sel = prop ? 'meta[property="' + prop + '"]' : 'meta[name="' + name + '"]';
      var el = document.querySelector(sel);
      if (!el) {
        el = document.createElement('meta');
        if (prop) el.setAttribute('property', prop); else el.setAttribute('name', name);
        document.head.appendChild(el);
      }
      el.setAttribute('content', content);
    }
    upsertMeta('og:type', null, 'article');
    upsertMeta('og:title', null, title);
    upsertMeta('og:description', null, desc || title);
    upsertMeta('og:url', null, staticUrl);
    upsertMeta('og:image', null, cover);
    upsertMeta('og:site_name', null, '亿数');
    upsertMeta(null, 'twitter:card', 'summary_large_image');
    upsertMeta(null, 'twitter:title', title);
    upsertMeta(null, 'twitter:description', desc || title);
    upsertMeta(null, 'twitter:image', cover);

    // NewsArticle JSON-LD
    var ldEl = document.getElementById('dynLd');
    if (ldEl) ldEl.remove();
    ldEl = document.createElement('script');
    ldEl.type = 'application/ld+json';
    ldEl.id = 'dynLd';
    var dateIso = (function(){
      if (!post.publishAt) return '';
      var d = new Date(Number(post.publishAt));
      var pad = function(n){return n<10?'0'+n:n;};
      return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate())+'T'+pad(d.getHours())+':'+pad(d.getMinutes())+':00+08:00';
    })();
    ldEl.textContent = JSON.stringify({
      '@context':'https://schema.org','@type':'NewsArticle',
      'headline': title, 'url': staticUrl,
      'datePublished': dateIso, 'dateModified': dateIso,
      'image': [cover], 'inLanguage':'zh-CN',
      'author':{'@type':'Organization','name':'亿数','url':'https://yishuzichan.cc'},
      'publisher':{'@type':'Organization','name':'亿数','url':'https://yishuzichan.cc',
        'logo':{'@type':'ImageObject','url':'https://yishuzichan.cc/images/es-logo.png'}},
      'mainEntityOfPage':{'@type':'WebPage','@id':staticUrl}
    });
    document.head.appendChild(ldEl);
  } catch(_) {}
}

// 显示错误
function showError(msg) {
  document.getElementById('stateLoading').style.display = 'none';
  document.getElementById('stateContent').style.display = 'none';
  var err = document.getElementById('stateError');
  err.style.display = 'flex';
  if (msg) document.getElementById('errorMsg').textContent = msg;
  document.title = '未找到公告 — 亿数';
  document.getElementById('crumbTitle').textContent = '未找到公告';
}

// 加载数据
(function() {
  var id = getParam('id');
  if (!id) {
    showError('未指定公告 ID。');
    return;
  }

  fetch('./data/posts.json', { cache: 'no-cache' })
    .then(function(res) {
      if (!res.ok) throw new Error('HTTP ' + res.status);
      return res.json();
    })
    .then(function(list) {
      var post = null;
      for (var i = 0; i < list.length; i++) {
        if (list[i].id === id) { post = list[i]; break; }
      }
      if (!post) {
        showError('未找到 ID 为 ' + id.slice(0, 12) + '... 的公告，可能已被下架。');
        return;
      }
      renderPost(post);
    })
    .catch(function(err) {
      showError('加载失败：' + err.message + '。请稍后重试。');
    });
})();
</script>
